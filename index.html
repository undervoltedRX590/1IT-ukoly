<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Školní nástěnka úkolů</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
 
        /* Sešitové pozadí */
        .notebook {
            width: 800px;
            min-height: 500px;
            background: white;
            border: 3px solid #333;
            border-radius: 5px;
            padding: 40px;
            background-image: linear-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 100% 30px;
            position: relative;
            box-shadow: 10px 10px 0px #bbb;
        }
 
        header { text-align: center; margin-bottom: 30px; line-height: 1; }
        h1 { font-size: 1.5rem; margin: 0; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        .red-title { color: #d94343; font-weight: bold; font-size: 2rem; display: block; }
 
        /* Tlačítko Přidat úkol */
        .add-task-container { text-align: center; margin-bottom: 40px; }
        .btn-add {
            background: white;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 10px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .btn-add:hover { transform: scale(1.05); background: #f9f9f9; }
        .plus-icon { font-size: 1.5rem; border: 2px solid #333; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
 
        /* Hlavní mřížka */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }
 
        .box {
            border: 3px solid #333;
            border-radius: 25px;
            padding: 20px;
            min-height: 200px;
            background: white;
            position: relative;
        }
 
        .box-title {
            position: absolute;
            top: -15px;
            left: 30px;
            background: white;
            padding: 0 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }
 
        /* Seznam úkolů */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .task-icons { display: flex; gap: 5px; }
        .icon { width: 20px; height: 20px; border: 1px solid #333; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .icon-check { background: #c8e6c9; }
        .icon-cross { background: #ffcdd2; }
 
        /* Učitelské poznámky */
        .teacher-text { font-style: italic; color: #555; font-size: 0.95rem; }
        .sticky-note {
            background: #ffeb3b;
            width: 80px;
            height: 40px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            transform: rotate(-5deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            border-top: 2px solid #fdd835;
        }
    </style>
</head>
<body>
 
<div class="notebook">
    <header>
        <h1>Vítejte na školní nástěnce</h1>
        <span class="red-title">úkolů</span>
    </header>
 
    <div class="add-task-container">
        <button class="btn-add" onclick="addNewTask()">
            <span class="plus-icon">+</span> přidat úkol
        </button>
    </div>
 
    <div class="content-grid">
        <div class="box">
            <span class="box-title">seznam</span>
            <ul class="task-list" id="task-list">
                <li class="task-item">
                    <span>úkol Stylistika (ČJ)</span>
                    <div class="task-icons">
                        <span class="icon icon-check">✔</span>
                    </div>
                </li>
                <li class="task-item">
                    <span>úkol rovnice (M)</span>
                    <div class="task-icons">
                        <span class="icon icon-cross">✘</span>
                    </div>
                </li>
            </ul>
        </div>
 
        <div class="box">
            <span class="box-title">učitelské poznámky</span>
            <div class="teacher-text">
                A. Fryblíková: „Odevzdat do pátku!“<br>
                Zkontrolovat sešity z minulého týdne.
            </div>
            <div class="sticky-note"></div>
        </div>
    </div>
</div>
 
<script>
    function addNewTask() {
        const text = prompt("Zadej název úkolu:");
        if (text) {
            const list = document.getElementById('task-list');
            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <span>${text}</span>
                <div class="task-icons">
                    <span class="icon" onclick="this.style.background='#c8e6c9'">✔</span>
                    <span class="icon" onclick="this.parentElement.parentElement.remove()">✘</span>
                </div>
            `;
            list.appendChild(li);
        }
    }
</script>
 
</body>
</html>
