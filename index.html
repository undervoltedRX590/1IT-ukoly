<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Školní sešit - Nástěnka</title>
    <style>
        body { 
            background-color: #fdfdfd; 
            display: flex; 
            justify-content: center; 
            padding: 40px;
            margin: 0;
        }
 
        /* Styl linkovaného papíru */
        .notebook-page { 
            width: 600px; 
            min-height: 800px;
            background: #fff;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 30px; /* Výška linky */
            padding: 60px 40px 40px 80px;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
 
        /* Svislá červená čára (okraj) */
        .notebook-page::before {
            content: '';
            position: absolute;
            top: 0; left: 60px;
            height: 100%;
            width: 2px;
            background-color: rgba(255, 0, 0, 0.3);
        }
 
        h2 { 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            color: #2c3e50;
            margin-top: 0;
            line-height: 30px;
        }
 
        /* Učitelské poznámky na okraji */
        .teacher-notes {
            position: absolute;
            right: -150px;
            top: 100px;
            width: 130px;
            color: #d9534f; /* Červená propiska */
            font-family: 'Brush Script MT', cursive;
            font-size: 1.2rem;
            transform: rotate(5deg);
            line-height: 1.2;
        }
 
        .form-section { margin-bottom: 40px; }
        
        input { 
            background: transparent;
            border: none;
            border-bottom: 1px solid #007bff;
            padding: 5px;
            margin: 5px 0;
            width: 80%;
            font-family: inherit;
        }
 
        button {
            margin-top: 10px;
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
 
        ul { list-style: none; padding: 0; }
        
        /* Úkoly zarovnané na linky */
        li { 
            line-height: 30px; /* Musí sedět s background-size */
            border-bottom: 1px dashed #eee;
            display: flex;
            justify-content: space-between;
        }
 
        .done { text-decoration: line-through; color: #888; }
        
        .date-tag { font-size: 0.8em; color: #666; margin-left: 10px; }
    </style>
</head>
<body>
 
<div class="notebook-page">
    <div class="teacher-notes">
        Dbej na úpravu!<br>
        Podepsat rodiči.<br>
        <span style="font-size: 2em;">1!</span>
    </div>
 
    <section class="form-section">
        <h2>✍️ Nový úkol</h2>
        <input type="text" id="subject" placeholder="Předmět">
        <input type="text" id="task" placeholder="Zadání...">
        <input type="date" id="deadline">
        <br>
        <button onclick="addTodo()">Zapsat do sešitu</button>
    </section>
 
    <section>
        <h2>📚 Moje povinnosti</h2>
        <ul id="todo-list">
            </ul>
    </section>
</div>
 
<script>
    function addTodo() {
        const sub = document.getElementById('subject').value;
        const task = document.getElementById('task').value;
        const date = document.getElementById('deadline').value;
 
        if(!sub || !task) return;
 
        const list = document.getElementById('todo-list');
        const li = document.createElement('li');
        
        li.innerHTML = `
            <span><strong>${sub}:</strong> ${task} <span class="date-tag">(${date})</span></span>
            <input type="checkbox" onclick="this.parentElement.classList.toggle('done')">
        `;
        
        list.appendChild(li);
        
        // Reset polí
        document.getElementById('subject').value = '';
        document.getElementById('task').value = '';
    }
</script>
 
</body>
</html>
