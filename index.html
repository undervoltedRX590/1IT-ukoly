<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Školní nástěnka - Finální verze</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; padding: 20px; margin: 0;
        }
 
        .notebook {
            width: 900px; min-height: 600px; background: white;
            border: 3px solid #333; border-radius: 5px; padding: 40px;
            background-image: linear-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 100% 30px; position: relative;
            box-shadow: 10px 10px 0px #bbb;
        }
 
        header { text-align: center; margin-bottom: 30px; cursor: pointer; user-select: none; }
        h1 { font-size: 1.5rem; margin: 0; color: #444; text-transform: uppercase; }
        .red-title { color: #d94343; font-weight: bold; font-size: 2rem; display: block; }
 
        #admin-status { color: #4CAF50; font-weight: bold; font-size: 0.8rem; display: none; margin-top: 5px; }
 
        /* Tlačítka jsou nyní vidět, ale dají se ovládat jen v adminu */
        .controls { 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 40px;
            opacity: 0.3; pointer-events: none; transition: 0.3s;
        }
 
        .controls.admin-active {
            opacity: 1; pointer-events: auto;
        }
 
        .btn-main {
            background: white; border: 3px solid #333; border-radius: 20px;
            padding: 10px 20px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px; font-size: 1rem;
        }
 
        .btn-main:hover { background: #f9f9f9; transform: translateY(-2px); }
 
        .circle-icon {
            width: 24px; height: 24px; border: 2px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
 
        .content-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        .box {
            border: 3px solid #333; border-radius: 25px; padding: 25px 20px;
            min-height: 300px; background: white; position: relative;
        }
 
        .box-title {
            position: absolute; top: -15px; left: 30px;
            background: white; padding: 0 10px; font-weight: bold;
        }
 
        .list-container { list-style: none; padding: 0; margin: 0; }
        .item {
            padding: 10px 0; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
 
        .task-info { flex-grow: 1; }
        .task-name { font-weight: bold; display: block; }
        .task-desc { font-size: 0.9rem; color: #666; display: block; margin: 2px 0; }
        .task-date { font-size: 0.8rem; color: #d94343; font-weight: bold; }
 
        .teacher-note-item { color: #d94343; font-style: italic; font-family: 'Comic Sans MS', cursive; }
        
        .btn-delete {
            background: #ffcdd2; border: 2px solid #333; border-radius: 8px;
            cursor: pointer; margin-left: 10px; padding: 5px; font-size: 1rem;
            display: none; /* Zapne se v JS při adminu */
        }
 
        /* Modální okno */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; border: 4px solid #333; border-radius: 20px;
            padding: 25px; width: 350px;
        }
        .modal-content input, .modal-content textarea { 
            width: 100%; padding: 8px; margin: 5px 0 15px 0; 
            border: 2px solid #333; border-radius: 8px; box-sizing: border-box;
        }
 
        .sticky-note {
            background: #ffeb3b; width: 60px; height: 30px;
            position: absolute; bottom: 15px; right: 15px; transform: rotate(-5deg);
        }
    </style>
</head>
<body>
 
<div class="notebook">
    <header onclick="toggleAdmin()">
        <h1>Vítejte na školní nástěnce</h1>
        <span class="red-title">úkolů</span>
        <div id="admin-status">ADMIN REŽIM AKTIVNÍ</div>
    </header>
 
    <div class="controls" id="admin-controls">
        <button class="btn-main" onclick="openModal('task')">
            <span class="circle-icon">+</span> přidat úkol
        </button>
        <button class="btn-main" onclick="openModal('note')" style="border-color: #d94343; color: #d94343;">
            <span class="circle-icon" style="border-color: #d94343;">!</span> přidat poznámku
        </button>
    </div>
 
    <div class="content-grid">
        <div class="box">
            <span class="box-title">seznam</span>
            <ul id="task-list" class="list-container"></ul>
        </div>
        <div class="box">
            <span class="box-title">učitelské poznámky</span>
            <ul id="note-list" class="list-container"></ul>
            <div class="sticky-note"></div>
        </div>
    </div>
</div>
 
<div id="modal-task" class="modal">
    <div class="modal-content">
        <h2>Nový úkol</h2>
        <input type="text" id="task-name" placeholder="Předmět / Název">
        <textarea id="task-desc" placeholder="Popis úkolu..."></textarea>
        <input type="date" id="task-date">
        <button class="btn-main" onclick="saveTask()">Uložit</button>
        <button class="btn-main" onclick="closeModals()" style="border-color:#ccc; margin-top:5px;">Zrušit</button>
    </div>
</div>
 
<div id="modal-note" class="modal">
    <div class="modal-content">
        <h2>Nová poznámka</h2>
        <input type="text" id="note-text" placeholder="Text poznámky...">
        <button class="btn-main" onclick="saveNote()">Uložit</button>
        <button class="btn-main" onclick="closeModals()" style="border-color:#ccc; margin-top:5px;">Zrušit</button>
    </div>
</div>
 
<script>
    let isAdmin = false;
    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    let notes = JSON.parse(localStorage.getItem('notes')) || [];
 
    // Spustit vykreslení hned po načtení
    window.onload = renderAll;
 
    function toggleAdmin() {
        isAdmin = !isAdmin;
        const status = document.getElementById('admin-status');
        const controls = document.getElementById('admin-controls');
        
        status.style.display = isAdmin ? 'block' : 'none';
        
        if(isAdmin) {
            controls.classList.add('admin-active');
        } else {
            controls.classList.remove('admin-active');
        }
        
        renderAll(); // Překreslit, aby se ukázaly/skryly popelnice
    }
 
    function openModal(type) {
        document.getElementById('modal-' + type).style.display = 'flex';
    }
 
    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }
 
    function saveTask() {
        const name = document.getElementById('task-name').value;
        const desc = document.getElementById('task-desc').value;
        const date = document.getElementById('task-date').value;
        if (!name) return;
        tasks.push({ name, desc, date });
        localStorage.setItem('tasks', JSON.stringify(tasks));
        renderAll();
        closeModals();
    }
 
    function saveNote() {
        const text = document.getElementById('note-text').value;
        if (!text) return;
        notes.push(text);
        localStorage.setItem('notes', JSON.stringify(notes));
        renderAll();
        closeModals();
    }
 
    function deleteItem(type, index) {
        if (type === 'task') {
            tasks.splice(index, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
        } else {
            notes.splice(index, 1);
            localStorage.setItem('notes', JSON.stringify(notes));
        }
        renderAll();
    }
 
    function renderAll() {
        const tList = document.getElementById('task-list');
        const nList = document.getElementById('note-list');
        
        tList.innerHTML = tasks.map((t, i) => `
            <li class="item">
                <div class="task-info">
                    <span class="task-name">${t.name}</span>
                    <span class="task-desc">${t.desc}</span>
                    ${t.date ? `<span class="task-date">📅 ${t.date}</span>` : ''}
                </div>
                <button class="btn-delete" style="display: ${isAdmin ? 'block' : 'none'}" onclick="deleteItem('task', ${i})">🗑️</button>
            </li>
        `).join('');
 
        nList.innerHTML = notes.map((n, i) => `
            <li class="item teacher-note-item">
                <span>• ${n}</span>
                <button class="btn-delete" style="display: ${isAdmin ? 'block' : 'none'}" onclick="deleteItem('note', ${i})">🗑️</button>
            </li>
        `).join('');
    }
</script>
 
</body>
</html>
